        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
          description: ''
  /api/patients/{id}/history/:
    get:
      operationId: patients_history_retrieve
      description: Return all appointments and medical records for a given patient.
      summary: Full clinical history of a patient
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Patient.
        required: true
      tags:
      - Patients
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: Appointments and medical records
  /api/appointments/:
    post:
      operationId: appointments_create
      description: |-
        ViewSet for managing appointments.
        Supports filtering by status, doctor, patient, type and date range.
      summary: Schedule a new appointment
      tags:
      - Appointments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
            examples:
              ScheduleAppointment:
                value:
                  patient: 15
                  doctor: 7
                  scheduled_at: '2026-03-30T14:30:00-03:00'
                  duration_minutes: 30
                  appointment_type: consultation
                  status: scheduled
                  reason: Routine checkup
                  notes: First consultation with this doctor
                summary: Schedule appointment
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppointmentRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
              examples:
                AppointmentCreated:
                  value:
                    id: 42
