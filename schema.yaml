openapi: 3.0.3
info:
  title: PulseCare API
  version: 1.0.0
  description: REST API for PulseCare — a healthcare management system that handles
    patients, appointments, medical records, and staff users.
  contact:
    name: PulseCare Team
    email: dev@pulsecare.com
  license:
    name: MIT
paths:
  /api/auth/token/:
    post:
      operationId: auth_token_create
      description: Authenticate with **email + password** and receive a JWT access
        token (8 h) and refresh token (7 d).
      summary: Obtain JWT access & refresh tokens
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthTokenRequestRequest'
            examples:
              LoginRequest:
                value:
                  email: email@email.com
                  password: Senha@123
                summary: Login request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthTokenRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthTokenRequestRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                LoginSuccess:
                  value:
                    refresh: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh-token
                    access: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access-token
                  summary: Login success
          description: ''
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: Exchange a valid refresh token for a new access token.
      summary: Refresh the JWT access token
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestRequest'
            examples:
              RefreshRequest:
                value:
                  refresh: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh-token
                summary: Refresh request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequestRequest'
        required: true
      security:
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
              examples:
                RefreshSuccess:
                  value:
                    access: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.new-access-token
                  summary: Refresh success
          description: ''
  /api/accounts/register/:
    post:
      operationId: accounts_register_create
      description: Create a new user with default role **receptionist**. An admin
        can later promote the user to another role.
      summary: Register a new account
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              ReceptionistRegistration:
                value:
                  username: matheus.feu
                  email: email@email.com
                  first_name: Matheus
                  last_name: Feu
                  phone: '11999999999'
                  password: StrongPass@123
                  confirm_password: StrongPass@123
                summary: Receptionist registration
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                RegistrationSuccess:
                  value:
                    id: 12
                    username: matheus
                    email: matheus@email.com
                    first_name: Matheus
                    last_name: Feulo
                    full_name: Matheus Feulo
                    role: receptionist
                    license_number: null
                    specialty: null
                    phone: '11999999999'
                    avatar: null
                    is_active: true
                    is_staff: false
                    created_at: '2026-03-29T02:10:04-03:00'
                    updated_at: '2026-03-29T02:10:04-03:00'
                  summary: Registration success
          description: ''
        '400':
          description: Validation error
  /api/accounts/password-reset/:
    post:
      operationId: accounts_password_reset_create
      description: Send a one-time password (OTP) to the given e-mail address. The
        response is always 200 to avoid user enumeration.
      summary: Request password reset OTP
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
            examples:
              PasswordResetRequest:
                value:
                  email: email@email.com
                summary: Password reset request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestResponse'
              examples:
                PasswordResetResponse:
                  value:
                    otp: '302321'
                  summary: Password reset response
          description: Reset OTP sent (if account exists)
  /api/accounts/password-reset/confirm/:
    post:
      operationId: accounts_password_reset_confirm_create
      description: Validate e-mail + OTP and set a new password.
      summary: Confirm password reset with OTP
      tags:
      - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
            examples:
              PasswordResetConfirmation:
                value:
                  email: email@email.com
                  otp: '302321'
                  new_password: NovaSenha@123
                  confirm_new_password: NovaSenha@123
                summary: Password reset confirmation
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                PasswordResetSuccess:
                  value:
                    detail: Password has been reset successfully. You can now log
                      in.
                  summary: Password reset success
          description: Password reset successfully
        '400':
          description: Invalid/expired OTP or validation error
  /api/users/:
    post:
      operationId: users_create
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: Create a new user (admin only)
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            examples:
              CreateDoctorUser:
                value:
                  username: dr.house
                  email: house@pulsecare.com
                  first_name: Gregory
                  last_name: House
                  role: doctor
                  license_number: CRM12345
                  specialty: Diagnostic Medicine
                  phone: '11988887777'
                  password: DoctorPass@123
                  confirm_password: DoctorPass@123
                summary: Create doctor user
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                UserCreated:
                  value:
                    id: 7
                    username: dr.house
                    email: house@pulsecare.com
                    first_name: Gregory
                    last_name: House
                    full_name: Gregory House
                    role: doctor
                    license_number: CRM12345
                    specialty: Diagnostic Medicine
                    phone: '11988887777'
                    avatar: null
                    is_active: true
                    is_staff: false
                    created_at: '2026-03-29T10:00:00-03:00'
                    updated_at: '2026-03-29T10:00:00-03:00'
                  summary: User created
          description: ''
        '400':
          description: Validation error
    get:
      operationId: users_list
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: List all active users (admin only)
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: is_staff
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
        description: Filter by role (admin, doctor, nurse, receptionist)
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Users
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
  /api/users/me/change-password/:
    post:
      operationId: users_me_change_password_create
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: Change the authenticated user password
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            examples:
              ChangePasswordRequest:
                value:
                  current_password: Senha@123
                  new_password: NovaSenha@123
                  confirm_new_password: NovaSenha@123
                summary: Change password request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                PasswordChangeSuccess:
                  value:
                    detail: Password updated successfully.
                  summary: Password change success
          description: Password updated successfully.
        '400':
          description: Validation error or incorrect password
  /api/users/me/:
    get:
      operationId: users_me_retrieve
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: Get the authenticated user profile
      tags:
      - Users
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                AuthenticatedProfile:
                  value:
                    id: 2
                    username: matheus
                    email: email@emai.com
                    first_name: Matheus
                    last_name: Feu
                    full_name: Matheus Feu
                    role: receptionist
                    license_number: null
                    specialty: null
                    phone: '11999999999'
                    avatar: null
                    is_active: true
                    is_staff: false
                    created_at: '2026-03-29T01:10:04-03:00'
                    updated_at: '2026-03-29T01:10:04-03:00'
                  summary: Authenticated profile
          description: ''
  /api/users/me/update/:
    patch:
      operationId: users_me_update_partial_update
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: Update the authenticated user profile
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
            examples:
              ProfileUpdate:
                value:
                  first_name: Matheus
                  last_name: Feulo
                  phone: '11977776666'
                summary: Profile update
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/users/{id}/:
    patch:
      operationId: users_partial_update
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: Partially update a user (admin only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdateRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
    delete:
      operationId: users_destroy
      description: Override to return 200 with message instead of 204 (since it's
        a soft delete).
      summary: Deactivate a user (soft delete, admin only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: User deactivated
    put:
      operationId: users_update
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: Update a user (admin only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdate'
          description: ''
    get:
      operationId: users_retrieve
      description: |-
        ViewSet for managing system users (staff members).
        Only admins can manage other users.
        Authenticated users can access only their own self-service endpoints.
      summary: Retrieve a user (admin only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this User.
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/patients/:
    post:
      operationId: patients_create
      description: |-
        ViewSet for managing patients.
        Supports search, filtering and ordering.
      summary: Register a new patient
      tags:
      - Patients
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientRequest'
            examples:
              CreatePatient:
                value:
                  first_name: Maria
                  last_name: Silva
                  date_of_birth: '1992-04-12'
                  gender: female
                  cpf: '12345678901'
                  phone: '11988887777'
                  email: maria.silva@email.com
                  blood_type: O+
                summary: Create patient
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatientRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatientRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
              examples:
                PatientCreated:
                  value:
                    id: 15
                    first_name: Maria
                    last_name: Silva
                    full_name: Maria Silva
                    date_of_birth: '1992-04-12'
                    age: 33
                    gender: female
                    cpf: 123.456.789-01
                    phone: '11988887777'
                    email: maria.silva@email.com
                    blood_type: O+
                    is_active: true
                    created_by: Admin PulseCare (Administrator)
                    created_at: '2026-03-29T10:30:00-03:00'
                    updated_at: '2026-03-29T10:30:00-03:00'
                  summary: Patient created
          description: ''
        '400':
          description: Validation error (e.g. invalid CPF, duplicate)
    get:
      operationId: patients_list
      description: |-
        ViewSet for managing patients.
        Supports search, filtering and ordering.
      summary: List patients
      parameters:
      - in: query
        name: age_max
        schema:
          type: number
        description: Maximum age
      - in: query
        name: age_min
        schema:
          type: number
        description: Minimum age
      - in: query
        name: blood_type
        schema:
          type: string
          enum:
          - A+
          - A-
          - AB+
          - AB-
          - B+
          - B-
          - O+
          - O-
          - unknown
        description: |-
          * `A+` - A+
          * `A-` - A-
          * `B+` - B+
          * `B-` - B-
          * `AB+` - AB+
          * `AB-` - AB-
          * `O+` - O+
          * `O-` - O-
          * `unknown` - Unknown
      - in: query
        name: city
        schema:
          type: string
      - in: query
        name: created_after
        schema:
          type: string
          format: date
      - in: query
        name: created_before
        schema:
          type: string
          format: date
      - in: query
        name: gender
        schema:
          type: string
          enum:
          - female
          - male
          - other
          - prefer_not_to_say
        description: |-
          * `male` - Male
          * `female` - Female
          * `other` - Other
          * `prefer_not_to_say` - Prefer not to say
      - in: query
        name: has_insurance
        schema:
          type: boolean
        description: Has insurance
      - in: query
        name: is_active
        schema:
          type: boolean
      - in: query
        name: name
        schema:
          type: string
        description: Full name (partial)
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: state
        schema:
          type: string
      tags:
      - Patients
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPatientListList'
          description: ''
  /api/patients/{id}/:
    patch:
